<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Liste des Accessoires</title>
    <link rel="stylesheet" type="text/css" href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />
    <script src="webjars/jquery/3.5.1/jquery.min.js"></script>
    <script type="text/javascript" src="webjars/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</head>
<body>
    <!-- Barre de navigation -->
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
        <a class="navbar-brand" href="#">Gestion Accessoires</a>
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" th:href="@{ListeAccessoires}">Home</a>
            </li>
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="navbardrop" data-toggle="dropdown">
                    Accessoires
                </a>
                <div class="dropdown-menu">
                    <a class="dropdown-item" th:href="@{showCreate}">Ajouter</a>
                    <a class="dropdown-item" th:href="@{ListeAccessoires}">Lister</a>
                </div>
            </li>
        </ul>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" id="navbardrop2" data-toggle="dropdown">
                    [username]
                </a>
                <div class="dropdown-menu">
                    <a class="dropdown-item" href="#">login</a>
                    <a class="dropdown-item" href="#">logout</a>
                    <a class="dropdown-item" href="#">Profile</a>
                </div>
            </li>
        </ul>
    </nav>

    <!-- Contenu principal -->
    <div class="container mt-5">
        <div class="card">
            <div class="card-header">Liste des Accessoires</div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Désignation</th>
                            <th>Tarif</th>
                            <th>Date d'ajout</th>
                            <th>Couleur</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a:${accessoires.content}">
                            <td th:text="${a.codeAcc}"></td>
                            <td th:text="${a.designation}"></td>
                            <td th:text="${a.tarif}"></td>
                            <td>
                                <!-- Bouton Éditer en vert dans la colonne Date -->
                                <a class="btn btn-success btn-sm" 
                                   th:href="@{editAccessoire(id=${a.codeAcc})}">
                                    Éditer
                                </a>
                            </td>
                            <td>
                                <!-- Bouton Supprimer en rouge dans la colonne Couleur -->
                                <a class="btn btn-danger btn-sm" 
                                   onclick="return confirm('Etes-vous sûr de vouloir supprimer cet accessoire ?')"
                                   th:href="@{supprimerAccessoire(id=${a.codeAcc}, page=${currentPage}, size=${size})}">
                                    Supprimer
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <!-- Pagination -->
                <ul class="nav nav-pills" th:if="${pages}">
                    <li th:each="page,status:${pages}">
                        <a th:class="${status.index == currentPage ? 'btn btn-primary' : 'btn'}"
                           th:href="@{ListeAccessoires(page=${status.index}, size=${size})}"
                           th:text="${status.index}"></a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
